    <path d="M70 417 L1000 532 L1030 501 L102 386 Z" fill="url(#rail)" stroke="#bfdbfe" stroke-width="1.4" />
    <path d="M115 402 L947 480" fill="none" stroke="#22c55e" stroke-width="8" stroke-linecap="round" opacity="0.22" filter="url(#glow)" />
    <text x="92" y="310" class="month">Jun</text>
    <text x="734" y="397" class="month">Jul</text>
    <text x="86" y="568" class="axis">Counts above towers. Dates below towers. Last 14 active streak days shown.</text>

