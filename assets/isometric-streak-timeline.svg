<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Large isometric GitHub streak timeline for Shivansh Sharma</title>
  <desc id="desc">A larger isometric contribution timeline with daily edit counts above each tower and dates below each tower.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="0.52" stop-color="#eff6ff" />
      <stop offset="1" stop-color="#ecfdf5" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#164e63" />
    </linearGradient>
    <linearGradient id="rail" x1="0" x2="1">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.14" />
      <stop offset="0.62" stop-color="#16a34a" stop-opacity="0.22" />
      <stop offset="1" stop-color="#2563eb" stop-opacity="0.16" />
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-40%" width="160%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .kicker { font: 800 13px Inter, Segoe UI, Arial, sans-serif; letter-spacing: .09em; text-transform: uppercase; fill: #2563eb; }
    .title { font: 850 39px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
    .copy { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
    .tiny { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; letter-spacing: .02em; }
    .stat-label { font: 800 11px Inter, Segoe UI, Arial, sans-serif; fill: #cbd5e1; letter-spacing: .07em; text-transform: uppercase; }
    .stat-value { font: 850 30px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; }
    .stat-note { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #bfdbfe; }
    .mini-label { font: 800 10px Inter, Segoe UI, Arial, sans-serif; fill: #2563eb; letter-spacing: .07em; text-transform: uppercase; }
    .mini-value { font: 850 22px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
    .count { font: 850 12px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
    .date { font: 800 11px Inter, Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; }
    .month { font: 850 14px Inter, Segoe UI, Arial, sans-serif; fill: #2563eb; letter-spacing: .09em; text-transform: uppercase; }
    .axis { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; }
  </style>

  <rect x="18" y="18" width="1064" height="584" rx="30" fill="url(#bg)" stroke="#dbeafe" />
  <path d="M42 506 C235 405 372 517 562 430 C731 353 842 396 1052 286" fill="none" stroke="#bfdbfe" stroke-width="2" opacity="0.58" />
  <path d="M58 545 C246 482 381 557 583 492 C747 438 862 454 1042 402" fill="none" stroke="#bbf7d0" stroke-width="2" opacity="0.65" />

  <text x="56" y="72" class="kicker">GitHub Streak</text>
  <text x="56" y="118" class="title">Isometric Streak Timeline</text>
  <text x="56" y="150" class="copy">Daily edit counts, dates, and a bigger contribution skyline in one clean panel.</text>
  <text x="56" y="175" class="tiny">Generated from the public contribution calendar on Jul 04, 2026.</text>

  <g transform="translate(690 54)">
    <rect width="168" height="112" rx="22" fill="url(#panel)" filter="url(#softShadow)" />
    <text x="22" y="34" class="stat-label">Current streak</text>
    <text x="22" y="75" class="stat-value">66 days</text>
    <text x="22" y="96" class="stat-note">active through Jul 04</text>
  </g>
  <g transform="translate(880 54)">
    <rect width="162" height="112" rx="22" fill="#ffffff" stroke="#dbeafe" filter="url(#softShadow)" />
    <text x="22" y="34" class="mini-label">Public window</text>
    <text x="22" y="73" class="mini-value">341</text>
    <text x="22" y="94" class="tiny">contributions</text>
  </g>
  <g transform="translate(690 186)">
    <rect width="168" height="72" rx="18" fill="#ffffff" stroke="#dbeafe" />
    <text x="22" y="30" class="mini-label">Best streak</text>
    <text x="22" y="55" class="mini-value" style="font-size:20px">66 days</text>
  </g>
  <g transform="translate(880 186)">
    <rect width="162" height="72" rx="18" fill="#ffffff" stroke="#dbeafe" />
    <text x="22" y="30" class="mini-label">Active days</text>
    <text x="22" y="55" class="mini-value" style="font-size:20px">90 days</text>
  </g>

