      <use href="#cube1" transform="translate(464 237)" style="--i:9" />
      <use href="#cube1" transform="translate(452 245)" style="--i:10" />
      <use href="#cube1" transform="translate(440 253)" style="--i:11" />
      <use href="#cube2" transform="translate(428 261)" style="--i:12" />
      <use href="#cube2" transform="translate(416 269)" style="--i:13" />
      <use href="#cube1" transform="translate(510 228)" style="--i:14" />
      <use href="#cube1" transform="translate(498 236)" style="--i:15" />
      <use href="#cube1" transform="translate(486 244)" style="--i:16" />
      <use href="#cube1" transform="translate(474 252)" style="--i:17" />
      <use href="#cube1" transform="translate(462 260)" style="--i:18" />
      <use href="#cube1" transform="translate(450 268)" style="--i:19" />
      <use href="#cube1" transform="translate(438 276)" style="--i:20" />
