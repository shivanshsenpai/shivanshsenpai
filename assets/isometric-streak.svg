<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">Isometric GitHub streak map for Shivansh Sharma</title>
  <desc id="desc">A polished isometric contribution streak timeline showing daily edit counts, dates, current streak, best streak, active days, and contributions.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="0.48" stop-color="#eff6ff" />
      <stop offset="1" stop-color="#ecfdf5" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#164e63" />
    </linearGradient>
    <linearGradient id="rail" x1="0" x2="1">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.10" />
      <stop offset="0.6" stop-color="#16a34a" stop-opacity="0.22" />
      <stop offset="1" stop-color="#2563eb" stop-opacity="0.16" />
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-40%" width="160%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <g id="tile0">
      <polygon points="0,-6 12,0 0,6 -12,0" fill="#dbeafe" stroke="#bfdbfe" stroke-width="0.7" />
    </g>
    <g id="cube1" filter="url(#softShadow)">
      <polygon points="0,-18 12,-12 0,-6 -12,-12" fill="#86efac" />
      <polygon points="-12,-12 0,-6 0,6 -12,0" fill="#22c55e" />
      <polygon points="12,-12 0,-6 0,6 12,0" fill="#16a34a" />
    </g>
    <g id="cube2" filter="url(#softShadow)">
      <polygon points="0,-26 12,-20 0,-14 -12,-20" fill="#4ade80" />
      <polygon points="-12,-20 0,-14 0,6 -12,0" fill="#16a34a" />
      <polygon points="12,-20 0,-14 0,6 12,0" fill="#15803d" />
    </g>
    <g id="cube3" filter="url(#softShadow)">
      <polygon points="0,-34 12,-28 0,-22 -12,-28" fill="#22c55e" />
      <polygon points="-12,-28 0,-22 0,6 -12,0" fill="#15803d" />
      <polygon points="12,-28 0,-22 0,6 12,0" fill="#166534" />
    </g>
    <g id="cube4" filter="url(#softShadow)">
      <polygon points="0,-44 12,-38 0,-32 -12,-38" fill="#10b981" />
      <polygon points="-12,-38 0,-32 0,6 -12,0" fill="#047857" />
      <polygon points="12,-38 0,-32 0,6 12,0" fill="#065f46" />
    </g>
  </defs>

  <style>
    .kicker { font: 700 13px Inter, Segoe UI, Arial, sans-serif; letter-spacing: .08em; text-transform: uppercase; fill: #2563eb; }
    .title { font: 800 34px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
    .copy { font: 500 15px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
    .tiny { font: 600 11px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; letter-spacing: .02em; }
    .stat-label { font: 700 11px Inter, Segoe UI, Arial, sans-serif; fill: #cbd5e1; letter-spacing: .06em; text-transform: uppercase; }
    .stat-value { font: 800 30px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; }
    .stat-note { font: 500 12px Inter, Segoe UI, Arial, sans-serif; fill: #bfdbfe; }
    .count { font: 800 13px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
    .date { font: 700 11px Inter, Segoe UI, Arial, sans-serif; fill: #334155; text-anchor: middle; }
    .month { font: 800 12px Inter, Segoe UI, Arial, sans-serif; fill: #2563eb; letter-spacing: .08em; text-transform: uppercase; }
    .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
    @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
  </style>

  <rect x="18" y="18" width="1064" height="394" rx="26" fill="url(#bg)" stroke="#dbeafe" />
  <path d="M46 348 C215 267 365 375 544 292 C710 216 831 257 1048 168" fill="none" stroke="#bfdbfe" stroke-width="2" opacity="0.55" />
  <path d="M55 376 C241 309 364 394 557 326 C719 269 843 286 1040 235" fill="none" stroke="#bbf7d0" stroke-width="2" opacity="0.6" />

  <text x="56" y="68" class="kicker">GitHub Streak</text>
  <text x="56" y="108" class="title">Isometric Streak Map</text>
  <text x="56" y="136" class="copy">A cleaner streak view for automation, gym systems, and ship-focused work.</text>
  <text x="56" y="158" class="tiny">Static SVG generated from the public contribution calendar on Jul 04, 2026.</text>

  <g transform="translate(766 54)">
    <rect width="276" height="166" rx="22" fill="url(#panel)" filter="url(#softShadow)" />
    <text x="24" y="36" class="stat-label">Current streak</text>
    <text x="24" y="76" class="stat-value">66 days</text>
    <text x="24" y="101" class="stat-note">active through Jul 04</text>
    <line x1="24" y1="118" x2="252" y2="118" stroke="#334155" />
    <text x="24" y="144" class="stat-note">Best streak: 66 days</text>
    <text x="158" y="144" class="stat-note">Active days: 90</text>
  </g>

  <g transform="translate(766 244)">
    <rect width="276" height="96" rx="20" fill="#ffffff" stroke="#dbeafe" />
    <text x="24" y="34" class="tiny">PUBLIC CALENDAR WINDOW</text>
    <text x="24" y="68" class="title" style="font-size:25px">341 contributions</text>
    <text x="24" y="86" class="copy" style="font-size:12px">14-day timeline with daily edit counts.</text>
  </g>

  <g id="timeline">
    <path d="M104 278 L752 383 L782 362 L134 257 Z" fill="url(#rail)" stroke="#bfdbfe" stroke-width="1.2" />
    <path d="M150 277 L709 368" fill="none" stroke="#22c55e" stroke-width="7" stroke-linecap="round" opacity="0.25" filter="url(#glow)" />
    <text x="128" y="214" class="month">Jun</text>
    <text x="560" y="286" class="month">Jul</text>
    <text x="115" y="390" class="tiny">date labels below, edit counts above each tower</text>

    <g class="tower" aria-label="Jun 21: 2 edits">
      <polygon points="132,253 150,263 150,287 132,277" fill="#4ade80" />
      <polygon points="168,253 150,263 150,287 168,277" fill="#22c55e" />
      <polygon points="150,243 168,253 150,263 132,253" fill="#bbf7d0" />
      <rect x="131" y="215" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="150" y="230" class="count">2</text>
      <text x="150" y="311" class="date">Jun 21</text>
    </g>
    <g class="tower" aria-label="Jun 22: 2 edits">
      <polygon points="175,260 193,270 193,294 175,284" fill="#4ade80" />
      <polygon points="211,260 193,270 193,294 211,284" fill="#22c55e" />
      <polygon points="193,250 211,260 193,270 175,260" fill="#bbf7d0" />
      <rect x="174" y="222" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="193" y="237" class="count">2</text>
      <text x="193" y="318" class="date">Jun 22</text>
