      <polygon points="426,231 408,241 408,329 426,319" fill="#047857" />
      <polygon points="408,221 426,231 408,241 390,231" fill="#34d399" />
      <rect x="382" y="193" width="52" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="408" y="208" class="count">21</text>
      <text x="408" y="353" class="date">Jun 27</text>
    </g>
    <g class="tower" aria-label="Jun 28: 5 edits">
      <polygon points="433,286 451,296 451,336 433,326" fill="#22c55e" />
