      <text x="451" y="360" class="date">Jun 28</text>
    </g>
    <g class="tower" aria-label="Jun 29: 1 edits">
      <polygon points="476,313 494,323 494,343 476,333" fill="#86efac" />
      <polygon points="512,313 494,323 494,343 512,333" fill="#22c55e" />
      <polygon points="494,303 512,313 494,323 476,313" fill="#dcfce7" />
      <rect x="475" y="275" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="494" y="290" class="count">1</text>
      <text x="494" y="367" class="date">Jun 29</text>
    </g>
    <g class="tower" aria-label="Jun 30: 6 edits">
      <polygon points="519,300 537,310 537,350 519,340" fill="#22c55e" />
      <polygon points="555,300 537,310 537,350 555,340" fill="#16a34a" />
      <polygon points="537,290 555,300 537,310 519,300" fill="#86efac" />
      <rect x="518" y="262" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="537" y="277" class="count">6</text>
      <text x="537" y="374" class="date">Jun 30</text>
    </g>
    <g class="tower" aria-label="Jul 01: 1 edits">
      <polygon points="562,327 580,337 580,357 562,347" fill="#86efac" />
      <polygon points="598,327 580,337 580,357 598,347" fill="#22c55e" />
      <polygon points="580,317 598,327 580,337 562,327" fill="#dcfce7" />
      <rect x="561" y="289" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="580" y="304" class="count">1</text>
      <text x="580" y="381" class="date">Jul 01</text>
    </g>
    <g class="tower" aria-label="Jul 02: 3 edits">
      <polygon points="605,324 623,334 623,364 605,354" fill="#4ade80" />
      <polygon points="641,324 623,334 623,364 641,354" fill="#22c55e" />
      <polygon points="623,314 641,324 623,334 605,324" fill="#bbf7d0" />
      <rect x="604" y="286" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="623" y="301" class="count">3</text>
      <text x="623" y="388" class="date">Jul 02</text>
    </g>
    <g class="tower" aria-label="Jul 03: 2 edits">
      <polygon points="648,337 666,347 666,371 648,361" fill="#4ade80" />
      <polygon points="684,337 666,347 666,371 684,361" fill="#22c55e" />
      <polygon points="666,327 684,337 666,347 648,337" fill="#bbf7d0" />
      <rect x="647" y="299" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="666" y="314" class="count">2</text>
      <text x="666" y="395" class="date">Jul 03</text>
    </g>
    <g class="tower" aria-label="Jul 04: 19 edits">
      <polygon points="691,280 709,290 709,378 691,368" fill="#059669" />
      <polygon points="727,280 709,290 709,378 727,368" fill="#047857" />
      <polygon points="709,270 727,280 709,290 691,280" fill="#34d399" />
      <rect x="683" y="242" width="52" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
