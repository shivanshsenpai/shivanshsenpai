      <use href="#cube1" transform="translate(520 243)" style="--i:22" />
      <use href="#cube1" transform="translate(508 251)" style="--i:23" />
      <use href="#cube1" transform="translate(496 259)" style="--i:24" />
      <use href="#cube1" transform="translate(484 267)" style="--i:25" />
      <use href="#cube1" transform="translate(472 275)" style="--i:26" />
      <use href="#cube1" transform="translate(460 283)" style="--i:27" />
      <use href="#cube1" transform="translate(554 242)" style="--i:28" />
      <use href="#cube1" transform="translate(542 250)" style="--i:29" />
      <use href="#cube1" transform="translate(530 258)" style="--i:30" />
      <use href="#cube1" transform="translate(518 266)" style="--i:31" />
      <use href="#cube1" transform="translate(506 274)" style="--i:32" />
      <use href="#cube1" transform="translate(494 282)" style="--i:33" />
      <use href="#cube1" transform="translate(482 290)" style="--i:34" />
      <use href="#cube1" transform="translate(576 249)" style="--i:35" />
      <use href="#cube1" transform="translate(564 257)" style="--i:36" />
      <use href="#cube1" transform="translate(552 265)" style="--i:37" />
      <use href="#cube1" transform="translate(540 273)" style="--i:38" />
      <use href="#cube1" transform="translate(528 281)" style="--i:39" />
      <use href="#cube3" transform="translate(516 289)" style="--i:40" />
      <use href="#cube2" transform="translate(504 297)" style="--i:41" />
      <use href="#cube2" transform="translate(598 256)" style="--i:42" />
      <use href="#cube1" transform="translate(586 264)" style="--i:43" />
      <use href="#cube2" transform="translate(574 272)" style="--i:44" />
      <use href="#cube2" transform="translate(562 280)" style="--i:45" />
      <use href="#cube1" transform="translate(550 288)" style="--i:46" />
      <use href="#cube1" transform="translate(538 296)" style="--i:47" />
      <use href="#cube1" transform="translate(526 304)" style="--i:48" />
