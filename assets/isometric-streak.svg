      <use href="#cube1" transform="translate(604 317)" style="--i:68" />
      <use href="#cube4" transform="translate(592 325)" style="--i:69" />
    </g>
  </g>

  <g transform="translate(60 322)">
    <rect width="226" height="48" rx="16" fill="#ffffff" stroke="#dbeafe" />
    <circle cx="28" cy="24" r="9" fill="#22c55e" />
    <text x="48" y="22" class="tiny">SINGLE STREAK VISUAL</text>
    <text x="48" y="38" class="copy" style="font-size:12px">Clean, compact, profile-ready.</text>
  </g>
</svg>
