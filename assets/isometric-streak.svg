      <polygon points="254,267 236,277 236,301 254,291" fill="#22c55e" />
      <polygon points="236,257 254,267 236,277 218,267" fill="#bbf7d0" />
      <rect x="217" y="229" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="236" y="244" class="count">2</text>
      <text x="236" y="325" class="date">Jun 23</text>
    </g>
    <g class="tower" aria-label="Jun 24: 1 edits">
      <polygon points="261,278 279,288 279,308 261,298" fill="#86efac" />
      <polygon points="297,278 279,288 279,308 297,298" fill="#22c55e" />
      <polygon points="279,268 297,278 279,288 261,278" fill="#dcfce7" />
      <rect x="260" y="240" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="279" y="255" class="count">1</text>
      <text x="279" y="332" class="date">Jun 24</text>
    </g>
    <g class="tower" aria-label="Jun 25: 8 edits">
      <polygon points="304,253 322,263 322,315 304,305" fill="#16a34a" />
      <polygon points="340,253 322,263 322,315 340,305" fill="#15803d" />
      <polygon points="322,243 340,253 322,263 304,253" fill="#4ade80" />
      <rect x="303" y="215" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
      <text x="322" y="230" class="count">8</text>
      <text x="322" y="339" class="date">Jun 25</text>
    </g>
    <g class="tower" aria-label="Jun 26: 8 edits">
      <polygon points="347,260 365,270 365,322 347,312" fill="#16a34a" />
      <polygon points="383,260 365,270 365,322 383,312" fill="#15803d" />
      <polygon points="365,250 383,260 365,270 347,260" fill="#4ade80" />
      <rect x="346" y="222" width="38" height="22" rx="11" fill="#ffffff" stroke="#bbf7d0" />
