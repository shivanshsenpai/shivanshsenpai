<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 130" preserveAspectRatio="none" role="img" aria-labelledby="title desc">
  <title id="title">Subtle shooting star animation</title>
  <desc id="desc">A minimal animated star field with soft blue shooting stars.</desc>
  <defs>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0"/>
      <stop offset="0.32" stop-color="#93c5fd" stop-opacity="0.12"/>
      <stop offset="0.72" stop-color="#60a5fa" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="#94a3b8">
    <circle cx="85" cy="46" r="1.4" opacity="0.28">
      <animate attributeName="opacity" values="0.18;0.62;0.18" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="192" cy="88" r="1.1" opacity="0.22">
      <animate attributeName="opacity" values="0.12;0.52;0.12" dur="4.6s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="318" cy="38" r="1.3" opacity="0.26">
      <animate attributeName="opacity" values="0.18;0.68;0.18" dur="4.1s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="506" cy="72" r="1.2" opacity="0.24">
      <animate attributeName="opacity" values="0.14;0.58;0.14" dur="3.5s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="684" cy="35" r="1.5" opacity="0.26">
      <animate attributeName="opacity" values="0.16;0.7;0.16" dur="4.8s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="821" cy="91" r="1.1" opacity="0.22">
      <animate attributeName="opacity" values="0.12;0.5;0.12" dur="3.9s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1028" cy="52" r="1.4" opacity="0.28">
      <animate attributeName="opacity" values="0.16;0.66;0.16" dur="4.2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1124" cy="86" r="1" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.46;0.1" dur="5s" begin="1.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#glow)" opacity="0">
    <line x1="-170" y1="35" x2="0" y2="0" stroke="url(#trail)" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2.4" fill="#dbeafe"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.78;1" dur="7s" begin="0.4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="-110 52" to="1320 -88" dur="7s" begin="0.4s" repeatCount="indefinite"/>
  </g>

  <g filter="url(#glow)" opacity="0">
    <line x1="-130" y1="28" x2="0" y2="0" stroke="url(#trail)" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#eff6ff"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.14;0.72;1" dur="9.5s" begin="3.2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="-90 102" to="1290 -42" dur="9.5s" begin="3.2s" repeatCount="indefinite"/>
  </g>
</svg>
