name: Update isometric streak

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate six-month streak SVG
        run: node scripts/generate-isometric-streak.js

      - name: Commit refreshed streak graphic
        run: |
          if git diff --quiet; then
            echo "No streak changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/isometric-streak-live.svg
          git commit -m "Refresh isometric streak graphic"
          git push
